name: Scriptlet security review

# Reviews pull requests for changes that could be malware or otherwise
# misaligned with uBlock Origin's sole purpose of blocking unwanted content in
# the browser. The primary concern is code that runs in or against web pages
# (scriptlets, injected resources, content scripts), but the whole diff is
# reviewed — see below.
#
# Runs on every PR to master (no `paths` filter) so that, when required by
# branch protection, it always reports a status check — a path-filtered workflow
# would leave the required check pending forever on PRs that touch no matching
# file. The script (tools/scriptlet-security-review.mjs) reviews the whole diff;
# there is no hardcoded list of security-sensitive paths to maintain, and a
# payload cannot hide in a file such a list would omit. Diffs with no security
# or privacy impact pass; an empty diff passes without an API call.
#
# Secrets (ANTHROPIC_API_KEY) are not exposed to PRs from forks, so fork PRs skip
# with a notice and a maintainer must review manually. Same-repo branches —
# including the automatically created `mirror` sync PR — are reviewed normally.
on:
  pull_request:
    branches:
      - master

permissions: {}

jobs:
  # Job name doubles as the required status-check context in branch protection.
  scriptlet-security-review:
    permissions:
      contents: read
      pull-requests: write
    runs-on: ubuntu-latest
    env:
      GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      PR_NUMBER: ${{ github.event.pull_request.number }}
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          # Run the trusted review script from the PR's base (master), never the
          # PR's own tree — this job runs with secrets on the same-repo sync PR,
          # and the diff itself is fetched separately via `gh pr diff` as data.
          ref: ${{ github.event.pull_request.base.sha }}

      - name: Collect pull request diff
        run: gh pr diff "$PR_NUMBER" --patch > "$RUNNER_TEMP/pr.patch"

      - name: Run security review
        id: review
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          PATCH_FILE: ${{ runner.temp }}/pr.patch
          REPORT_FILE: ${{ runner.temp }}/review-report.md
          PR_TITLE: ${{ github.event.pull_request.title }}
        run: node tools/scriptlet-security-review.mjs

      - name: Post review comment
        if: steps.review.outputs.failed == 'true'
        env:
          REPORT_FILE: ${{ runner.temp }}/review-report.md
        run: |
          # Upsert by marker so we only ever edit this gate's own comment, never
          # another bot's (e.g. brave/pull-merge posts on the same mirror PR).
          marker='<!-- scriptlet-security-review -->'
          id=$(gh api --paginate "repos/$GITHUB_REPOSITORY/issues/$PR_NUMBER/comments" \
            --jq ".[] | select(.body | startswith(\"$marker\")) | .id" | tail -n1)
          if [ -n "$id" ]; then
            gh api -X PATCH "repos/$GITHUB_REPOSITORY/issues/comments/$id" \
              -f body="$(cat "$REPORT_FILE")" > /dev/null
          else
            gh pr comment "$PR_NUMBER" --body-file "$REPORT_FILE"
          fi

      - name: Fail when flagged or review could not complete
        if: steps.review.outputs.failed == 'true'
        run: |
          echo "::error::Scriptlet security review verdict: ${{ steps.review.outputs.verdict }} — see the PR comment for details."
          exit 1
