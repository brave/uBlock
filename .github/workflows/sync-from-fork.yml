name: Sync from fork
on:
  schedule:
    # * is a special character in YAML so you have to quote this string
    - cron: "0 * * * *"
  workflow_dispatch:

permissions: {}

jobs:
  check-for-changes:
    permissions:
      contents: read
    runs-on: ubuntu-latest
    env:
      FILES_TO_CHECK: "assets/assets.json|src/web_accessible_resources/|src/js/resources/|src/js/redirect-resources.js|src/js/jsonpath.js|src/js/arglist-parser.js|src/js/urlskip.js"
      UPSTREAM_URL: "https://github.com/gorhill/ublock.git"
    outputs:
      changes: ${{ steps.git-check.outputs.changes-present }}
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
      - name: Fetch release version
        run: |
          git remote add upstream ${UPSTREAM_URL}
          git fetch upstream && git diff --name-only --diff-filter AM HEAD..remotes/upstream/master > updatedfiles.txt
      - name: Check for modified files
        id: git-check
        run: echo changes-present=$(if grep -qE "${FILES_TO_CHECK}" updatedfiles.txt; then echo 'true'; else echo 'false'; fi) >> $GITHUB_OUTPUT
      - name: Show files
        run: cat updatedfiles.txt
      - name: Have files changed
        if: steps.git-check.outputs.changes-present == 'false'
        run: echo "No changes needed to be synchronised"
  sync:
    permissions:
      contents: write
    if: ${{ needs.check-for-changes.outputs.changes == 'true' }}
    env:
      GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
    needs: check-for-changes
    runs-on: ubuntu-latest
    steps:
      - name: Create mirror branch
        run: |
          git clone "https://github.com/gorhill/${GITHUB_REPOSITORY#$GITHUB_REPOSITORY_OWNER/}"
          cd ${GITHUB_REPOSITORY#$GITHUB_REPOSITORY_OWNER/}
          git checkout -b mirror
          git remote add github "https://$GITHUB_ACTOR:$GITHUB_TOKEN@github.com/$GITHUB_REPOSITORY.git"
          git push -u github mirror
  check-imports:
    permissions: {}
    needs: sync
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          ref: mirror
          fetch-depth: 0
      - name: Block if .github/pull-merge.json changed on mirror
        run: |
          git fetch origin master:refs/remotes/origin/master
          if git diff --name-only origin/master..HEAD -- .github/pull-merge.json | grep -q .; then
            echo "::error::.github/pull-merge.json modified by upstream sync — refusing to auto-merge."
            exit 1
          fi
      - name: Install patchutils
        run: sudo apt-get update && sudo apt-get install -y patchutils
      - name: Run import checker (no network, no secrets)
        run: sudo unshare -n node .github/braveCheckImports.js
  create-pr:
    permissions:
      pull-requests: write
    if: ${{ needs.sync.result == 'success' && needs.check-imports.result == 'success' }}
    env:
      GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
    needs: [sync, check-imports]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
      - uses: ./.github/actions/create-or-skip-pr
        with:
          repo: ${{ github.repository }}
          pr_title: "Fork Sync: Update from parent repository"
          pr_body: "This PR was automatically created by a GitHub Action triggered by a cron schedule. Please review the changes and merge if appropriate."
          base: master
          head: mirror
  update-pr:
    permissions:
      pull-requests: write
    needs: create-pr
    runs-on: ubuntu-latest
    env:
      GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
      - uses: ./.github/actions/find-mirror-pr
        id: find-pr
        with:
          repo: ${{ github.repository }}
          pr_title: "Fork Sync: Update from parent repository"
          head_branch: mirror
      - name: Run puLL-Merge
        uses: brave/pull-merge@main
        with:
          owner: ${{ github.repository_owner }}
          repo: ${{ github.event.repository.name }}
          prnum: ${{ steps.find-pr.outputs.pr_number }}
          github_token: ${{ secrets.GITHUB_TOKEN }}
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          debug: "true"
  on-failure:
    runs-on: ubuntu-latest
    if: ${{ always() && (needs.check-for-changes.result == 'failure' || needs.check-imports.result == 'failure' || needs.sync.result == 'failure' || needs.create-pr.result == 'failure' || needs.update-pr.result == 'failure') }}
    needs:
      - check-for-changes
      - check-imports
      - sync
      - create-pr
      - update-pr
    steps:
      - uses: 8398a7/action-slack@28ba43ae48961b90635b50953d216767a6bea486 # v3.16.2
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
        with:
          author_name: "Github Actions"
          status: failure
          fields: repo,message,commit,author,eventName,ref,workflow,pullRequest
